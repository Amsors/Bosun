{{- if and (not .Values.egressProxy.allowAllDomains) (not .Values.egressProxy.allowedDomains) }}
{{- fail "egressProxy.allowedDomains must contain at least one domain when egressProxy.allowAllDomains=false" }}
{{- end }}
{{- range .Values.egressProxy.allowedDomains }}
{{- if not (regexMatch "^\\.?[A-Za-z0-9]([A-Za-z0-9.-]*[A-Za-z0-9])?$" .) }}
{{- fail (printf "invalid egressProxy.allowedDomains entry %q" .) }}
{{- end }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: bosun-egress-proxy
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
    app.kubernetes.io/name: bosun-egress-proxy
data:
  squid.conf: |
    http_port 3128
    visible_hostname bosun-egress-proxy
    acl CONNECT method CONNECT
    acl SSL_ports port 443
    {{- if not .Values.egressProxy.allowAllDomains }}
    acl allowed_domains dstdomain{{- range .Values.egressProxy.allowedDomains }} {{ . }}{{- end }}
    {{- end }}
    http_access deny !CONNECT
    http_access deny !SSL_ports
    {{- if .Values.egressProxy.allowAllDomains }}
    http_access allow CONNECT
    {{- else }}
    http_access allow CONNECT allowed_domains
    {{- end }}
    http_access deny all
    cache deny all
    access_log stdio:/dev/stdout
    cache_log /dev/stderr
    pid_filename /tmp/squid.pid
    coredump_dir /tmp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bosun-egress-proxy
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
    app.kubernetes.io/name: bosun-egress-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bosun-egress-proxy
  template:
    metadata:
      annotations:
        checksum/allowlist: {{ toJson (dict "allowAllDomains" .Values.egressProxy.allowAllDomains "allowedDomains" .Values.egressProxy.allowedDomains) | sha256sum }}
      labels:
        {{- include "bosun.labels" . | nindent 8 }}
        app.kubernetes.io/name: bosun-egress-proxy
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        role: core
      securityContext:
        runAsNonRoot: true
        runAsUser: 31
        runAsGroup: 31
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: squid
          image: {{ include "bosun.image" (dict "root" . "name" .Values.images.egressProxy) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - {name: proxy, containerPort: 3128}
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 250m, memory: 256Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          livenessProbe:
            tcpSocket: {port: proxy}
          readinessProbe:
            tcpSocket: {port: proxy}
          volumeMounts:
            - {name: config, mountPath: /etc/squid/squid.conf, subPath: squid.conf, readOnly: true}
            - {name: tmp, mountPath: /tmp}
            - {name: logs, mountPath: /var/log/squid}
            - {name: spool, mountPath: /var/spool/squid}
      volumes:
        - name: config
          configMap:
            name: bosun-egress-proxy
        - {name: tmp, emptyDir: {sizeLimit: 16Mi}}
        - {name: logs, emptyDir: {sizeLimit: 32Mi}}
        - {name: spool, emptyDir: {sizeLimit: 16Mi}}
---
apiVersion: v1
kind: Service
metadata:
  name: bosun-egress-proxy
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
    app.kubernetes.io/name: bosun-egress-proxy
spec:
  selector:
    app.kubernetes.io/name: bosun-egress-proxy
  ports:
    - {name: proxy, port: 3128, targetPort: proxy}
