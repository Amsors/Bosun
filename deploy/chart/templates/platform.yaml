apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: bosun-free
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
value: 1000
globalDefault: false
preemptionPolicy: Never
description: Bosun free agent sessions without preemption.
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: bosun-normal
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
value: 2000
globalDefault: false
preemptionPolicy: Never
description: Bosun normal-priority agent sessions; scheduled before low-priority sessions.
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: bosun-high
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
value: 3000
globalDefault: false
preemptionPolicy: Never
description: Bosun high-priority agent sessions; first to receive newly available capacity.
{{- range $name := list "backend-api" "gateway" "operator" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bosun-{{ $name }}
  labels:
    {{- include "bosun.labels" $ | nindent 4 }}
automountServiceAccountToken: {{ or (eq $name "operator") (eq $name "backend-api") (eq $name "gateway") }}
{{- end }}
