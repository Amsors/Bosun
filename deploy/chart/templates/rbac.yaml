apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bosun-operator
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
rules:
  - apiGroups: ["bosun.io"]
    resources: ["userenvironments", "agentsessions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["bosun.io"]
    resources: ["agentsessions"]
    verbs: ["patch", "update"]
  - apiGroups: ["bosun.io"]
    resources: ["userenvironments/status", "agentsessions/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["bosun.io"]
    resources: ["userenvironments/finalizers", "agentsessions/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["namespaces", "resourcequotas", "limitranges", "serviceaccounts", "pods", "persistentvolumeclaims", "events"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles"]
    resourceNames: ["bosun-user-backend-terminal"]
    verbs: ["bind"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bosun-operator
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bosun-operator
subjects:
  - kind: ServiceAccount
    name: bosun-operator
    namespace: {{ .Release.Namespace }}
---
# backend API 只对 CR 做 CRUD（techspec §9.2）；不授予 status 写权限（status 由 operator 独占），
# 也不授予 Pod/PVC/Secret 集群级权限——那些通过 operator 在各用户 namespace 创建的 RoleBinding 下放。
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bosun-backend-api
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
rules:
  - apiGroups: ["bosun.io"]
    resources: ["userenvironments", "agentsessions"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bosun-backend-api
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bosun-backend-api
subjects:
  - kind: ServiceAccount
    name: bosun-backend-api
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bosun-gateway
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bosun-gateway
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bosun-gateway
subjects:
  - kind: ServiceAccount
    name: bosun-gateway
    namespace: {{ .Release.Namespace }}
---
# UserEnvironment controller 在每个用户 namespace 创建 RoleBinding 绑定本角色。
# Secret 权限严格只写，credential 明文只允许 gateway 读取（techspec §9.2）。
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bosun-user-backend-terminal
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "patch", "delete"]
