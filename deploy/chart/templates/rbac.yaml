apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bosun-operator
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
rules:
  - apiGroups: ["bosun.io"]
    resources: ["userenvironments", "agentsessions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["bosun.io"]
    resources: ["userenvironments/status", "agentsessions/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["bosun.io"]
    resources: ["userenvironments/finalizers", "agentsessions/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["namespaces", "resourcequotas", "limitranges", "serviceaccounts", "pods", "persistentvolumeclaims", "events"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bosun-operator
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bosun-operator
subjects:
  - kind: ServiceAccount
    name: bosun-operator
    namespace: {{ .Release.Namespace }}
