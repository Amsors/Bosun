global:
  registry: registry.cn-hangzhou.aliyuncs.com/bosun
  imageTag: "0000000"
  imagePullPolicy: IfNotPresent

database:
  existingSecret: bosun-database
  storageClass: local-path
  storageSize: 10Gi

agent:
  storageClass: local-path
  idleScanInterval: 30s

# JWT 私钥等敏感值由部署者在集群外注入 Secret（spec/05），不写入 values。
# 期望 Secret 含 key: private-key（PKCS#8 Ed25519 PEM）。
auth:
  jwtSecret: bosun-jwt
  trustedProxyHeader: X-Forwarded-For

ingress:
  rateLimit:
    enabled: true
    average: 100
    burst: 50
    period: 1m
    ipDepth: 1

images:
  api: backend-api
  gateway: gateway
  operator: operator
  agent: agent
  frontend: frontend
  postgres: postgres:16.10-alpine3.22@sha256:029660641a0cfc575b14f336ba448fb8a75fd595d42e1fa316b9fb4378742297
