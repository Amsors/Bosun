global:
  registry: registry.cn-hangzhou.aliyuncs.com/amsors
  imageTag: "0000000"
  imagePullPolicy: IfNotPresent

database:
  existingSecret: bosun-database
  storageClass: local-path
  storageSize: 10Gi

agent:
  storageClass: local-path
  idleScanInterval: 30s
  imagePullPolicy: IfNotPresent

api:
  terminal:
    writeQueueCapacity: 64
    inputQueueCapacity: 64
    maxFrameBytes: 65536
    writeTimeout: 10s
    pongTimeout: 60s
    pingInterval: 30s
    activityMinInterval: 15s

# 默认 provider key 由部署者在集群外创建 Secret，不进入 values（spec/05）。
# 期望 Secret 的 key 由 secretKey 指定。
gateway:
  upstreamURL: https://api.anthropic.com
  provider: platform-default
  existingSecret: bosun-default-provider
  secretKey: api-key
  upstreamAuthHeader: x-api-key
  upstreamAuthScheme: ""

egressProxy:
  # Squid dstdomain 以点前缀同时匹配域名本身及其子域名。
  allowedDomains:
    - .github.com

# JWT 私钥等敏感值由部署者在集群外注入 Secret（spec/05），不写入 values。
# 期望 Secret 含 key: private-key（PKCS#8 Ed25519 PEM）。
auth:
  jwtSecret: bosun-jwt
  trustedProxyHeader: X-Forwarded-For

ingress:
  enabled: false
  className: traefik
  host: bosun.amsors.com
  entryPoints:
    http: web
    https: websecure
  tlsSecretName: bosun-tls
  rateLimit:
    enabled: true
    average: 100
    burst: 50
    period: 1m
    ipDepth: 1

certManager:
  enabled: false
  clusterIssuerName: bosun-letsencrypt-production
  accountKeySecretName: bosun-letsencrypt-production-account-key
  email: ""
  acmeServer: https://acme-v02.api.letsencrypt.org/directory

images:
  api: backend-api
  gateway: gateway
  operator: operator
  agent: agent
  egressProxy: egress-proxy
  frontend: frontend
  postgres: postgres:16.10-alpine3.22@sha256:029660641a0cfc575b14f336ba448fb8a75fd595d42e1fa316b9fb4378742297
