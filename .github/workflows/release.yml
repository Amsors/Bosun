name: Publish images

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: Full commit SHA on main to publish after CI has passed
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ inputs.git_sha }}
  cancel-in-progress: false

env:
  REGISTRY: ${{ vars.ACR_REGISTRY }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.ref.outputs.commit_sha }}
      image_tag: ${{ steps.ref.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: ref
        name: Validate immutable image tag
        env:
          DISPATCH_SHA: ${{ inputs.git_sha }}
        run: |
          set -euo pipefail
          if [[ ! "${DISPATCH_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "git_sha must be a full 40-character lowercase commit SHA" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "${DISPATCH_SHA}" origin/main; then
            echo "git_sha must identify a commit reachable from main" >&2
            exit 1
          fi
          echo "commit_sha=${DISPATCH_SHA}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${DISPATCH_SHA::7}" >> "${GITHUB_OUTPUT}"

  images:
    needs: prepare
    runs-on: ubuntu-latest
    environment: registry
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend-api
            context: .
            dockerfile: backend/Dockerfile
            build_args: COMPONENT=api
          - image: gateway
            context: .
            dockerfile: backend/Dockerfile
            build_args: COMPONENT=gateway
          - image: operator
            context: operator
            dockerfile: operator/Dockerfile
            build_args: ""
          - image: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            build_args: ""
          - image: agent
            context: images/agent
            dockerfile: images/agent/Dockerfile
            build_args: ""
          - image: egress-proxy
            context: images/egress-proxy
            dockerfile: images/egress-proxy/Dockerfile
            build_args: ""
    steps:
      - name: Validate registry configuration
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          for name in REGISTRY ACR_USERNAME ACR_PASSWORD DOCKERHUB_USERNAME DOCKERHUB_TOKEN; do
            if [[ -z "${!name}" ]]; then
              echo "${name} is not configured" >&2
              exit 1
            fi
          done
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/amsors/${{ matrix.image }}:${{ needs.prepare.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ needs.prepare.outputs.image_tag }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
