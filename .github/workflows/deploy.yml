name: Deploy production

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: Full commit SHA on main whose six images are already present in Docker Hub
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

env:
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
  REGISTRY: docker.io/${{ vars.DOCKERHUB_NAMESPACE }}
  CERT_MANAGER_VERSION: v1.21.0
  PUBLIC_HOST: bosun.amsors.com

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.ref.outputs.commit_sha }}
      image_tag: ${{ steps.ref.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: ref
        name: Validate published image tag
        env:
          DISPATCH_SHA: ${{ inputs.git_sha }}
        run: |
          set -euo pipefail
          if [[ ! "${DISPATCH_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "git_sha must be a full 40-character lowercase commit SHA" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "${DISPATCH_SHA}" origin/main; then
            echo "git_sha must identify a commit reachable from main" >&2
            exit 1
          fi
          echo "commit_sha=${DISPATCH_SHA}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${DISPATCH_SHA::7}" >> "${GITHUB_OUTPUT}"

  deploy:
    needs: prepare
    runs-on: [self-hosted, linux, bosun-deploy]
    environment: production
    steps:
      - name: Validate deployment configuration
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          PROVIDER_API_KEY: ${{ secrets.DEFAULT_PROVIDER_API_KEY }}
          PROVIDER_NAME: ${{ vars.DEFAULT_PROVIDER_NAME }}
          PROVIDER_UPSTREAM_URL: ${{ vars.DEFAULT_PROVIDER_UPSTREAM_URL }}
          PROVIDER_AUTH_HEADER: ${{ vars.DEFAULT_PROVIDER_AUTH_HEADER }}
          PROVIDER_AUTH_SCHEME: ${{ vars.DEFAULT_PROVIDER_AUTH_SCHEME }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL }}
        run: |
          set -euo pipefail
          for name in DOCKERHUB_NAMESPACE KUBECONFIG_B64 JWT_PRIVATE_KEY PROVIDER_API_KEY \
            PROVIDER_NAME PROVIDER_UPSTREAM_URL PROVIDER_AUTH_HEADER ACME_EMAIL; do
            if [[ -z "${!name}" ]]; then
              echo "${name} is not configured" >&2
              exit 1
            fi
          done
          if [[ "${PROVIDER_AUTH_HEADER,,}" == "x-api-key" &&
                "${PROVIDER_AUTH_SCHEME}" != "__EMPTY__" ]]; then
            echo "DEFAULT_PROVIDER_AUTH_SCHEME must be __EMPTY__ for X-Api-Key" >&2
            exit 1
          fi
          if [[ ! "${ACME_EMAIL}" =~ ^[^[:space:]@]+@[^[:space:]@]+$ ]]; then
            echo "ACME_EMAIL must be a valid contact email address" >&2
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}
          submodules: recursive
      - uses: azure/setup-helm@v4
        with:
          version: v4.2.3
      - name: Deploy immutable git SHA
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          PROVIDER_API_KEY: ${{ secrets.DEFAULT_PROVIDER_API_KEY }}
          PROVIDER_NAME: ${{ vars.DEFAULT_PROVIDER_NAME }}
          PROVIDER_UPSTREAM_URL: ${{ vars.DEFAULT_PROVIDER_UPSTREAM_URL }}
          PROVIDER_AUTH_HEADER: ${{ vars.DEFAULT_PROVIDER_AUTH_HEADER }}
          PROVIDER_AUTH_SCHEME: ${{ vars.DEFAULT_PROVIDER_AUTH_SCHEME }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL }}
        run: |
          set -euo pipefail
          if [[ "${PROVIDER_AUTH_SCHEME}" == "__EMPTY__" ]]; then
            PROVIDER_AUTH_SCHEME=""
          fi
          kubeconfig="${RUNNER_TEMP}/bosun-kubeconfig"
          cleanup() {
            rm -f "${kubeconfig}"
          }
          trap cleanup EXIT
          umask 077
          printf '%s' "${KUBECONFIG_B64}" | base64 --decode > "${kubeconfig}"
          export KUBECONFIG="${kubeconfig}"

          edge_nodes="$(kubectl get nodes \
            --selector role=edge \
            --output jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}')"
          edge_count="$(sed '/^$/d' <<< "${edge_nodes}" | wc --lines)"
          if [[ "${edge_count}" -ne 1 ]]; then
            echo "exactly one role=edge node is required; found ${edge_count}" >&2
            exit 1
          fi
          edge_node="$(sed '/^$/d' <<< "${edge_nodes}")"

          unexpected_lb_nodes="$({
            kubectl get nodes \
              --selector svccontroller.k3s.cattle.io/enablelb=true \
              --output name || true
          } | grep -v "^node/${edge_node}$" || true)"
          if [[ -n "${unexpected_lb_nodes}" ]]; then
            echo "ServiceLB is enabled on unexpected nodes: ${unexpected_lb_nodes}" >&2
            exit 1
          fi
          kubectl label node "${edge_node}" \
            svccontroller.k3s.cattle.io/enablelb=true \
            --overwrite
          kubectl apply --filename deploy/cluster/traefik-config.yaml
          kubectl wait deployment/traefik \
            --namespace kube-system \
            --for=jsonpath='{.spec.template.spec.nodeSelector.role}'=edge \
            --timeout 5m
          kubectl wait service/traefik \
            --namespace kube-system \
            --for=jsonpath='{.spec.externalTrafficPolicy}'=Local \
            --timeout 5m
          kubectl rollout status deployment/traefik \
            --namespace kube-system \
            --timeout 5m

          helm upgrade --install cert-manager \
            oci://quay.io/jetstack/charts/cert-manager \
            --version "${CERT_MANAGER_VERSION}" \
            --namespace cert-manager \
            --create-namespace \
            --set crds.enabled=true \
            --set nodeSelector.role=core \
            --set webhook.nodeSelector.role=core \
            --set cainjector.nodeSelector.role=core \
            --set startupapicheck.nodeSelector.role=core \
            --atomic \
            --wait \
            --timeout 10m

          printf '%s' "${JWT_PRIVATE_KEY}" |
            kubectl create secret generic bosun-jwt \
              --namespace bosun-platform \
              --from-file=private-key=/dev/stdin \
              --dry-run=client \
              --output yaml |
            kubectl apply --filename -
          printf '%s' "${PROVIDER_API_KEY}" |
            kubectl create secret generic bosun-default-provider \
              --namespace bosun-platform \
              --from-file=api-key=/dev/stdin \
              --dry-run=client \
              --output yaml |
            kubectl apply --filename -
          helm upgrade --install bosun deploy/chart \
            --namespace bosun-platform \
            --create-namespace \
            --set-string global.registry="${REGISTRY}" \
            --set-string global.imageTag="${IMAGE_TAG}" \
            --set-string gateway.provider="${PROVIDER_NAME}" \
            --set-string gateway.upstreamURL="${PROVIDER_UPSTREAM_URL}" \
            --set-string gateway.upstreamAuthHeader="${PROVIDER_AUTH_HEADER}" \
            --set-string gateway.upstreamAuthScheme="${PROVIDER_AUTH_SCHEME}" \
            --set ingress.enabled=true \
            --set-string ingress.host="${PUBLIC_HOST}" \
            --set certManager.enabled=true \
            --set-string certManager.email="${ACME_EMAIL}" \
            --atomic \
            --wait \
            --timeout 15m

          kubectl wait certificate/bosun-tls \
            --namespace bosun-platform \
            --for=condition=Ready \
            --timeout 10m

          http_status="$(curl \
            --silent \
            --show-error \
            --output /dev/null \
            --write-out '%{http_code}' \
            --max-time 20 \
            "http://${PUBLIC_HOST}/healthz")"
          if [[ "${http_status}" != "308" ]]; then
            echo "HTTP endpoint returned ${http_status}; expected permanent HTTPS redirect (308)" >&2
            exit 1
          fi
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 6 \
            --retry-all-errors \
            --retry-delay 5 \
            --max-time 20 \
            "https://${PUBLIC_HOST}/healthz"
