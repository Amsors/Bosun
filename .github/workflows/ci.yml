name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache-dependency-path: backend/go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: backend
      - run: go test ./...
      - run: go build ./cmd/api ./cmd/gateway

  operator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache-dependency-path: operator/go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: operator
      - run: go test ./...
      - run: make manifests generate
      - run: git diff --exit-code -- config/crd/bases api/v1alpha1/zz_generated.deepcopy.go

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build

  delivery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: azure/setup-helm@v4
        with:
          version: v4.2.3
      - run: helm lint deploy/chart
      - name: Reject latest tags and likely secrets
        run: ./deploy/scripts/validate-m0.sh
