name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      BOSUN_TEST_DATABASE_URL: postgres://bosun:bosun@127.0.0.1:5432/bosun?sslmode=disable
    services:
      postgres:
        image: postgres:16.10-alpine3.22@sha256:029660641a0cfc575b14f336ba448fb8a75fd595d42e1fa316b9fb4378742297
        env:
          POSTGRES_USER: bosun
          POSTGRES_PASSWORD: bosun
          POSTGRES_DB: bosun
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bosun -d bosun"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache-dependency-path: backend/go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: backend
      - run: go test -p 1 ./...
      - run: go build ./cmd/api ./cmd/gateway
      - run: docker build --build-arg COMPONENT=api --file backend/Dockerfile .
        working-directory: .

  operator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache-dependency-path: operator/go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: operator
      - run: make test
      - run: git diff --exit-code -- config/crd/bases api/v1alpha1/zz_generated.deepcopy.go

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build

  delivery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: azure/setup-helm@v4
        with:
          version: v4.2.3
      - run: helm lint deploy/chart
      - name: Reject latest tags and likely secrets
        run: ./deploy/scripts/validate-m0.sh
