name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      operator: ${{ steps.changes.outputs.operator }}
      frontend: ${{ steps.changes.outputs.frontend }}
      agent_image: ${{ steps.changes.outputs.agent_image }}
      egress_image: ${{ steps.changes.outputs.egress_image }}
      delivery: ${{ steps.changes.outputs.delivery }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - id: changes
        name: Detect affected modules
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: ./deploy/scripts/ci-changes.sh "${BASE_SHA}" "${HEAD_SHA}"

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    env:
      BOSUN_TEST_DATABASE_URL: postgres://bosun:bosun@127.0.0.1:5432/bosun?sslmode=disable
    services:
      postgres:
        image: postgres:16.10-alpine3.22@sha256:029660641a0cfc575b14f336ba448fb8a75fd595d42e1fa316b9fb4378742297
        env:
          POSTGRES_USER: bosun
          POSTGRES_PASSWORD: bosun
          POSTGRES_DB: bosun
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bosun -d bosun"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache-dependency-path: |
            backend/go.sum
            operator/go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: backend
      - run: go test -p 1 ./...
      - run: go build ./cmd/api ./cmd/gateway

  operator:
    needs: changes
    if: needs.changes.outputs.operator == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache-dependency-path: operator/go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: operator
      - run: make test
      - run: git diff --exit-code -- config/crd/bases api/v1alpha1/zz_generated.deepcopy.go

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build

  agent_image:
    name: agent-image
    needs: changes
    if: needs.changes.outputs.agent_image == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./images/agent/smoke-test.sh bosun-agent:ci

  egress_image:
    name: egress-image
    needs: changes
    if: needs.changes.outputs.egress_image == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --file images/egress-proxy/Dockerfile images/egress-proxy

  delivery:
    needs: changes
    if: needs.changes.outputs.delivery == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache: false
      - uses: azure/setup-helm@v4
        with:
          version: v4.2.3
      - name: Check GitHub Actions workflows
        run: |
          set -euo pipefail
          GOBIN="${RUNNER_TEMP}" go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "${RUNNER_TEMP}/actionlint"
      - name: Reject latest tags, likely secrets, and stale generated manifests
        run: ./deploy/scripts/validate-delivery.sh
      - name: Check delivery shell scripts
        run: shellcheck -x -P e2e deploy/scripts/*.sh e2e/*.sh
      - name: Test cluster data reset failure handling
        run: make cluster-reset-data-test

  ci_gate:
    name: ci-gate
    if: always()
    needs: [changes, backend, operator, frontend, agent_image, egress_image, delivery]
    runs-on: ubuntu-latest
    steps:
      - name: Require every affected module to pass
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          OPERATOR_RESULT: ${{ needs.operator.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          AGENT_IMAGE_RESULT: ${{ needs.agent_image.result }}
          EGRESS_IMAGE_RESULT: ${{ needs.egress_image.result }}
          DELIVERY_RESULT: ${{ needs.delivery.result }}
        run: |
          set -euo pipefail
          for result in \
            "${CHANGES_RESULT}" \
            "${BACKEND_RESULT}" \
            "${OPERATOR_RESULT}" \
            "${FRONTEND_RESULT}" \
            "${AGENT_IMAGE_RESULT}" \
            "${EGRESS_IMAGE_RESULT}" \
            "${DELIVERY_RESULT}"; do
            if [[ "${result}" == "failure" || "${result}" == "cancelled" ]]; then
              exit 1
            fi
          done
