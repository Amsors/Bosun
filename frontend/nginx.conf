worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 256;
}

http {
  include /etc/nginx/mime.types;
  map $http_x_forwarded_proto $proxy_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
  }
  access_log /dev/stdout;
  error_log /dev/stderr warn;
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;

  server {
    listen 8080;
    root /usr/share/nginx/html;
    location / {
      try_files $uri $uri/ /index.html;
    }
    location /api/ {
      proxy_pass http://bosun-api:8080;
      proxy_http_version 1.1;
      # Preserve a non-default local port for the WebSocket same-origin check.
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      # Preserve Traefik's original HTTPS scheme; fall back to the direct scheme in local dev.
      proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 1h;
    }
    location = /healthz {
      access_log off;
      return 200 "ok\n";
    }
  }
}
