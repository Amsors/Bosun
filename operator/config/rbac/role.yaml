kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - limitranges
  - namespaces
  - resourcequotas
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - bosun.io
  resources:
  - agentsessions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - bosun.io
  resources:
  - agentsessions/finalizers
  - userenvironments/finalizers
  verbs:
  - update
- apiGroups:
  - bosun.io
  resources:
  - agentsessions/status
  - userenvironments/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - bosun.io
  resources:
  - userenvironments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
